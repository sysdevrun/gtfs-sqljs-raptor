name: Deploy website to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # The website depends on the root package via `file:..`, which resolves
      # to `dist/` per the root package.json `main`/`types`. Install + build
      # the root first so those files exist before the website is installed.
      - name: Install root package
        run: npm install --no-audit --no-fund

      - name: Build root package
        run: npm run build

      - name: Install website dependencies
        run: npm install --no-audit --no-fund
        working-directory: website

      - name: Build website
        run: npm run build
        working-directory: website

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
